services:
  - type: web
    name: hoa-violation-tracker
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      # Email (violation notices + password reset) via Brevo's HTTPS API.
      # Render's free tier blocks SMTP ports, so use the API, not raw SMTP.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
